app = 'split-expanses'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '3000'

[http_service]
  internal_port = 3000
  force_https = true
  auto_stop_machines = 'stop'
  auto_start_machines = true
  min_machines_running = 0
  processes = ['app']

[mounts]
  source = 'media_data'
  destination = '/app/media'

[[vm]]
  memory = '256mb'
  cpu_kind = 'shared'
  cpus = 1
